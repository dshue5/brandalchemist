<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--fg:#EDE8E0;--accent:#DEFF47;
  --dim:#252525;--mid:#585858;
  --serif:'Cormorant Garamond',serif;--mono:'Space Mono',monospace;
}
html{background:var(--bg)}
html,body{height:100%}
body{color:var(--fg);font-family:var(--mono);font-size:13px;min-height:100vh;overflow-x:hidden}

#bg-names{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px 28px;padding:28px;align-content:start}
#bg-names span{font-family:var(--mono);font-size:11px;letter-spacing:0.1em;color:#EDE8E0;opacity:0.12;transition:opacity 0.3s ease;white-space:nowrap;overflow:hidden;text-transform:uppercase}

.page{max-width:880px;margin:0 auto;padding:52px 28px 120px;position:relative;z-index:1}

.eyebrow{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--mid);margin-bottom:20px}

h1{font-family:var(--serif);font-weight:300;font-size:clamp(54px,9vw,108px);line-height:.88;letter-spacing:-.02em;margin-bottom:28px}
h1 em{font-style:italic;color:var(--accent)}

.intro{font-size:12px;color:var(--mid);letter-spacing:.04em;line-height:1.9;max-width:360px;margin-bottom:72px}

.formula{display:flex;align-items:stretch;gap:16px;margin-bottom:56px;min-height:64px}
.slot{flex:1;border-bottom:1px solid var(--dim);display:flex;align-items:flex-end;padding-bottom:10px;transition:border-color .25s;cursor:default}
.slot.active{border-color:var(--accent)}
.slot-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)}
.slot-value{font-family:var(--serif);font-style:italic;font-size:32px;color:var(--accent);line-height:1;animation:up .25s ease both}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.op{font-family:var(--serif);font-size:30px;font-weight:300;color:var(--dim);display:flex;align-items:flex-end;padding-bottom:10px;transition:color .25s;flex-shrink:0;user-select:none}
.op.lit{color:var(--accent)}

.instr{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--mid);margin-bottom:20px;height:14px}
.grid{display:flex;flex-wrap:wrap;gap:8px}

.val{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:9px 16px;border:1px solid var(--dim);background:transparent;color:#666;cursor:pointer;transition:all .15s ease;user-select:none;-webkit-tap-highlight-color:transparent}
.val:hover:not(.sel-a):not(.sel-b):not(.off){border-color:#444;color:var(--fg)}
.val.sel-a{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:700}
.val.sel-b{border-color:var(--accent);color:var(--accent)}
.val.off{opacity:.18;pointer-events:none}

.reveal{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;opacity:0;pointer-events:none;transition:opacity .3s ease}
.reveal.on{opacity:1;pointer-events:all}

.r-combo{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--mid);display:flex;align-items:center;gap:14px;margin-bottom:36px}
.r-combo .a{color:var(--accent)}
.r-combo .b{color:var(--accent)}

.r-line{width:0;height:1px;background:var(--accent);transition:width .55s cubic-bezier(.16,1,.3,1);margin-bottom:32px;flex-shrink:0}
.reveal.on .r-line{width:min(560px,80vw)}

.r-brand{font-family:var(--serif);font-weight:300;font-size:clamp(50px,10.5vw,136px);line-height:.88;letter-spacing:-.02em;text-align:center;opacity:0;transform:translateY(18px);transition:opacity .45s ease .25s,transform .45s ease .25s}
.reveal.on .r-brand{opacity:1;transform:translateY(0)}

.r-tagline{font-family:var(--serif);font-style:italic;font-size:clamp(15px,2.2vw,20px);color:var(--mid);margin-top:20px;text-align:center;opacity:0;transition:opacity .45s ease .45s;max-width:480px;line-height:1.3}
.reveal.on .r-tagline{opacity:1}

.r-cat{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin-top:14px;text-align:center;opacity:0;transition:opacity .45s ease .6s}
.reveal.on .r-cat{opacity:1}

.r-unknown{font-family:var(--serif);font-style:italic;font-size:clamp(22px,3.5vw,38px);color:#2E2E2E;text-align:center;max-width:460px;line-height:1.5;opacity:0;transform:translateY(18px);transition:opacity .45s ease .25s,transform .45s ease .25s}
.reveal.on .r-unknown{opacity:1;transform:translateY(0)}

#rContent{display:flex;flex-direction:column;align-items:center;width:100%}
.r-img-wrap{width:min(280px,70vw);height:min(280px,70vw);margin-top:28px;opacity:0;transition:opacity .45s ease .55s;flex-shrink:0}
.reveal.on .r-img-wrap{opacity:1}
.r-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}

.r-btn{margin-top:60px;padding:11px 30px;border:1px solid var(--dim);background:transparent;color:var(--mid);font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;opacity:0;transition:opacity .45s ease .75s,color .2s,border-color .2s}
.reveal.on .r-btn{opacity:1}
.r-btn:hover{border-color:var(--fg);color:var(--fg)}

.mix-btn{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:1;padding:12px 40px;border:1px solid #2A2A2A;background:transparent;color:#2A2A2A;font-family:var(--mono);font-size:11px;letter-spacing:.25em;text-transform:uppercase;cursor:default;transition:border-color .25s,color .25s,background .15s;white-space:nowrap;pointer-events:none}
.mix-btn.ready{border-color:var(--accent);color:var(--accent);cursor:pointer;pointer-events:all}
.mix-btn.ready:hover{background:var(--accent);color:var(--bg)}

.kbd{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#1A1A1A;white-space:nowrap;pointer-events:none}

.counter{margin-top:60px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#2A2A2A}
.counter span{color:#3A3A3A}

.copyright{position:fixed;left:12px;top:50%;z-index:1;transform:translateY(-50%) rotate(-90deg);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#3A3A3A;pointer-events:none;white-space:nowrap}
@media(max-width:600px){.copyright{left:50%;top:auto;bottom:8px;transform:translateX(-50%);writing-mode:horizontal-tb;rotate:none}}

.debug-btn{position:fixed;bottom:22px;right:22px;background:transparent;border:none;color:transparent;font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:6px 12px;cursor:default;width:80px;height:28px}

.r-nav{display:flex;align-items:center;gap:24px;margin-top:32px;opacity:0;transition:opacity .45s ease .75s}
.reveal.on .r-nav{opacity:1}
.r-nav-btn{background:transparent;border:1px solid var(--dim);color:var(--mid);font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;padding:11px 24px;cursor:pointer;transition:color .2s,border-color .2s}
.r-nav-btn:hover{border-color:var(--fg);color:var(--fg)}
.r-nav-count{font-size:10px;letter-spacing:.18em;color:#333;min-width:60px;text-align:center}
</style>
</head>
<body>

<div id="bg-names"></div>

<div class="page">
  <h1>Brand<br><em>Alchemist</em></h1>
  <p class="intro">Select two values.<br>Discover what brand lives at their intersection.</p>

  <div class="formula">
    <div class="slot" id="slotA"><span id="slotAT" class="slot-label">First value</span></div>
    <div class="op" id="op">+</div>
    <div class="slot" id="slotB"><span id="slotBT" class="slot-label">Second value</span></div>
  </div>

  <p class="instr" id="instr">Select a value to begin</p>
  <div class="grid" id="grid"></div>

</div>

<div class="reveal" id="reveal">
  <div class="r-combo"><span class="a" id="rA"></span><span style="color:var(--dim)">×</span><span class="b" id="rB"></span></div>
  <div class="r-line"></div>
  <div id="rContent"></div>
  <div class="r-nav" id="rNav" style="display:none">
    <button class="r-nav-btn" id="rPrev">← prev</button>
    <span class="r-nav-count" id="rNavCount"></span>
    <button class="r-nav-btn" id="rNext">next →</button>
  </div>
  <button class="r-btn" id="rReset">← Try another</button>
</div>

<button class="mix-btn" id="mixBtn">Mix</button>

<p class="copyright">© Derek Shue 2026</p>
<button class="debug-btn" id="debugBtn">troubleshoot</button>

  'intellectual+playful':   {n:'Marni',               t:'Earthy colour combinations, mismatched prints, and chunky resin jewellery with a long-standing art-world following',         c:'Fashion'},
  'dark+intellectual':      {n:'Peter Do',            t:'Dark, rigorous tailoring known for precise construction, intellectual restraint, and a quietly subversive approach to the female wardrobe',       c:'Fashion'},
  'intellectual+rebellious':{n:'Craig Green',         t:'London label making sculptural clothing that explores the body and collective identity',           c:'Fashion'},
  'intellectual+nostalgic': {n:'Wales Bonner',        t:'London label built through rigorous academic research into African and Caribbean cultural history', c:'Fashion'},
  'intellectual+technical': {n:'Nemen',               t:'Italian technical brand that treats materials science as the primary design discipline',      c:'Technical Apparel'},
  'intellectual+organic':   {n:'Margaret Howell',     t:'British label favouring linen and cotton, rooted in workwear and utility with nothing decorative added',         c:'Fashion'},
  'camp+intellectual':      {n:'JW Anderson',         t:'British label known for irreverent, campy collections with a consistent engagement with art and design history',           c:'Fashion'},
  'affordable+intellectual':{n:'Muji',                t:'Japanese retailer whose no-logo design philosophy extends from clothing to furniture to food',    c:'Lifestyle'},
};

function key(a,b){return[a,b].sort().join('+')}

// Build reverse map: value → brand names
const _v2b={};
V.forEach(v=>_v2b[v]=new Set());
Object.entries(B).forEach(([k,brand])=>k.split('+').forEach(v=>{if(_v2b[v])_v2b[v].add(brand.n)}));

// Unique brand names
const _allBrands=[...new Set(Object.values(B).map(b=>b.n))];

// Populate background grid
(function(){
  const bg=document.getElementById('bg-names');
  const items=[];
  while(items.length<800)items.push(..._allBrands);
  items.slice(0,800).forEach(name=>{
    const s=document.createElement('span');
    s.textContent=name;
    s.dataset.b=name;
    bg.appendChild(s);
  });
})();

function updateBg(activeVals,revealBrand){
  const highlighted=new Set();
  activeVals.forEach(v=>{if(_v2b[v])_v2b[v].forEach(n=>highlighted.add(n))});
  document.querySelectorAll('#bg-names span').forEach(s=>{
    const n=s.dataset.b;
    s.style.opacity=revealBrand&&n===revealBrand?'1':highlighted.has(n)?'0.25':'0.12';
  });
}

let selA=null,selB=null;

function render(){
  const sA=document.getElementById('slotA'),sAT=document.getElementById('slotAT');
  const sB=document.getElementById('slotB'),sBT=document.getElementById('slotBT');
  const op=document.getElementById('op'),instr=document.getElementById('instr');

  if(selA){sA.classList.add('active');sAT.className='slot-value';sAT.textContent=selA}
  else{sA.classList.remove('active');sAT.className='slot-label';sAT.textContent='First value'}

  if(selB){sB.classList.add('active');sBT.className='slot-value';sBT.textContent=selB}
  else{sB.classList.remove('active');sBT.className='slot-label';sBT.textContent='Second value'}

  op.classList.toggle('lit',!!(selA&&selB));

  if(!selA) instr.textContent='Select a value to begin';
  else if(!selB) instr.textContent='Now select a second value';
  else instr.textContent='';

  const mixBtn=document.getElementById('mixBtn');
  mixBtn.classList.toggle('ready',!!(selA&&selB));

  document.querySelectorAll('.val').forEach(el=>{
    const v=el.dataset.v;
    el.classList.remove('sel-a','sel-b','off');
    if(v===selA) el.classList.add('sel-a');
    else if(v===selB) el.classList.add('sel-b');
  });
  updateBg([selA,selB].filter(Boolean),null);
}

function pick(v){
  if(v===selA) selA=null;
  else if(v===selB) selB=null;
  else if(!selA) selA=v;
  else if(!selB) selB=v;
  render();
}

function stripAccents(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'')}

function slugVariants(name){
  const norm=stripAccents(name);
  const words=name.split(/\s+/);
  const lower=name.toLowerCase();
  const lowerWords=words.map(w=>w.toLowerCase());
  const normWords=norm.split(/\s+/);
  const normLower=norm.toLowerCase();
  const normLowerWords=normWords.map(w=>w.toLowerCase());
  return[
    normLowerWords.join('-'),
    normLowerWords.join('_'),
    normLower.replace(/\s+/g,''),
    normWords.join('-'),
    lowerWords.join('-'),
    lowerWords.join('_'),
    lower.replace(/\s+/g,''),
    name,
    words.join('-'),
    words.join(''),
    lower,
    words[0]+(words.slice(1).map(w=>w[0].toUpperCase()+w.slice(1).toLowerCase()).join('')),
    norm,
    normWords.join(''),
    normLower,
  ].filter((v,i,a)=>a.indexOf(v)===i);
}

function loadBrandImg(name,wrap){
  const exts=['webp','jpg','jpeg','png','gif','avif'];
  const slugs=slugVariants(name);
  const candidates=slugs.flatMap(s=>exts.map(e=>`images/${s}.${e}`));
  let i=0;
  function tryNext(){
    if(i>=candidates.length) return;
    const img=new Image();
    img.onload=()=>{wrap.appendChild(img)};
    img.onerror=()=>{tryNext()};
    img.src=candidates[i++];
  }
  tryNext();
}

function showReveal(){
  document.getElementById('rA').textContent=selA;
  document.getElementById('rB').textContent=selB;
  const brand=B[key(selA,selB)];
  const c=document.getElementById('rContent');
  if(brand){
    c.innerHTML=`<div class="r-brand">${brand.n}</div><div class="r-tagline">${brand.t}</div><div class="r-img-wrap" id="rImgWrap"></div>`;
    loadBrandImg(brand.n,document.getElementById('rImgWrap'));
    posthog.capture('brand_revealed',{brand:brand.n,category:brand.c,value_a:selA,value_b:selB});
    updateBg([selA,selB].filter(Boolean),brand.n);
  } else {
    c.innerHTML=`<div class="r-unknown">This combination<br>has yet to be named.<br><br>Perhaps that's your job.</div>`;
    posthog.capture('brand_revealed',{brand:null,value_a:selA,value_b:selB});
    updateBg([selA,selB].filter(Boolean),null);
  }
  requestAnimationFrame(()=>document.getElementById('reveal').classList.add('on'));
}

function reset(){
  document.getElementById('reveal').classList.remove('on');
  document.getElementById('rNav').style.display='none';
  tMode=false;
  selA=null;selB=null;
  render();
  updateBg([],null);
}

// troubleshoot mode
let tMode=false,tIdx=0;
const tKeys=Object.keys(B);

function tShow(idx){
  tIdx=(idx+tKeys.length)%tKeys.length;
  const k=tKeys[tIdx];
  const [a,b]=k.split('+');
  document.getElementById('rA').textContent=a;
  document.getElementById('rB').textContent=b;
  const brand=B[k];
  const c=document.getElementById('rContent');
  c.innerHTML=`<div class="r-brand">${brand.n}</div><div class="r-tagline">${brand.t}</div><div class="r-img-wrap" id="rImgWrap"></div>`;
  loadBrandImg(brand.n,document.getElementById('rImgWrap'));
  document.getElementById('rNavCount').textContent=`${tIdx+1} / ${tKeys.length}`;
}

document.getElementById('debugBtn').addEventListener('click',()=>{
  tMode=true;
  tIdx=0;
  document.getElementById('rNav').style.display='flex';
  document.getElementById('rReset').textContent='← back';
  tShow(0);
  requestAnimationFrame(()=>document.getElementById('reveal').classList.add('on'));
});

document.getElementById('rPrev').addEventListener('click',()=>tShow(tIdx-1));
document.getElementById('rNext').addEventListener('click',()=>tShow(tIdx+1));

document.getElementById('mixBtn').addEventListener('click',()=>{if(selA&&selB) showReveal()});
document.getElementById('rReset').addEventListener('click',reset);
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') reset();
  if(tMode&&e.key==='ArrowLeft') tShow(tIdx-1);
  if(tMode&&e.key==='ArrowRight') tShow(tIdx+1);
});

const grid=document.getElementById('grid');
V.forEach(v=>{
  const b=document.createElement('button');
  b.className='val';b.dataset.v=v;b.textContent=v;
  b.addEventListener('click',()=>pick(v));
  grid.appendChild(b);
});


render();

const _preloadQueue=Object.values(B);
let _preloadIdx=0;
function _preloadNext(){
  if(_preloadIdx>=_preloadQueue.length)return;
  const brand=_preloadQueue[_preloadIdx++];
  const exts=['webp','jpg','jpeg','png','gif','avif'];
  const slugs=slugVariants(brand.n);
  const candidates=slugs.flatMap(s=>exts.map(e=>`images/${s}.${e}`));
  let i=0;
  function tryNext(){
    if(i>=candidates.length){setTimeout(_preloadNext,100);return;}
    const img=new Image();
    img.onload=()=>setTimeout(_preloadNext,100);
    img.onerror=()=>tryNext();
    img.src=candidates[i++];
  }
  tryNext();
}
setTimeout(_preloadNext,2000);
</script>
